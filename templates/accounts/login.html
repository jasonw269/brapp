<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRApp Login</title>
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root{--gold:#E8A800;--gold-light:#F5C842;--black:#111;--dark:#1A1A1A;--dark2:#242424;--dark3:#2E2E2E;--white:#F5F0E8;--muted:#9A9080;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Lato',sans-serif;background:var(--black);color:var(--white);min-height:100vh;display:flex;flex-direction:column;}
        body::before{content:'🏹';position:fixed;font-size:50vw;opacity:0.02;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}

        nav{background:var(--dark);border-bottom:1px solid var(--dark3);padding:0 24px;display:flex;align-items:center;justify-content:space-between;}
        .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;padding:12px 0;}
        .nav-brand img{width:34px;}
        .nav-brand-name{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:var(--gold);letter-spacing:2px;}
        .nav-links{display:flex;gap:4px;align-items:center;}
        .nav-link{color:var(--muted);text-decoration:none;padding:8px 12px;border-radius:4px;font-size:.85rem;font-weight:700;}
        .nav-link:hover{color:var(--gold);background:rgba(232,168,0,.08);}

        .main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
        .wrap{width:420px;max-width:100%;}
        .logo-area{text-align:center;margin-bottom:28px;}
        .logo-area img{width:80px;filter:drop-shadow(0 0 20px rgba(232,168,0,.4));}
        .brand{font-family:'Cinzel',serif;font-size:2.2rem;font-weight:700;color:var(--gold);letter-spacing:4px;margin-top:10px;}
        .brand-sub{font-size:.72rem;color:var(--muted);letter-spacing:4px;text-transform:uppercase;}
        .card{background:var(--dark);border:1px solid var(--dark3);border-radius:8px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
        .card-top{height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold));margin:-32px -32px 28px;border-radius:8px 8px 0 0;}
        h2{font-family:'Cinzel',serif;font-size:1.05rem;color:var(--white);margin-bottom:22px;}
        .fg{margin-bottom:16px;}
        label{display:block;font-size:.73rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:5px;}
        input{width:100%;background:var(--dark2);border:1px solid var(--dark3);color:var(--white);padding:11px 13px;border-radius:4px;font-family:'Lato',sans-serif;font-size:.92rem;transition:border-color .2s;}
        input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(232,168,0,.15);}
        input::placeholder{color:var(--muted);}
        .btn{width:100%;padding:12px;background:var(--gold);color:var(--black);border:none;border-radius:4px;font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:6px;}
        .btn:hover{background:var(--gold-light);}
        .err{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);border-radius:4px;padding:10px 13px;color:#e74c3c;font-size:.84rem;margin-bottom:14px;}
        hr{border:none;border-top:1px solid var(--dark3);margin:18px 0;}
        .foot{text-align:center;font-size:.83rem;color:var(--muted);}
        .foot a{color:var(--gold);text-decoration:none;}
        .pub-links{display:flex;justify-content:center;gap:16px;margin-top:14px;flex-wrap:wrap;}
        .pub-links a{color:var(--muted);text-decoration:none;font-size:.82rem;}
        .pub-links a:hover{color:var(--gold);}
    </style>
</head>
<body>
{% load static %}
<nav>
    <a href="{% url 'home' %}" class="nav-brand">
        <img src="{% static 'images/bralogo.jpg' %}" alt="BRA">
        <span class="nav-brand-name">BRApp</span>
    </a>
    <div class="nav-links">
        <a href="{% url 'about' %}"   class="nav-link">About</a>
        <a href="{% url 'gallery' %}" class="nav-link">Gallery</a>
        <a href="{% url 'contact' %}" class="nav-link">Contact</a>
        <a href="{% url 'course_list' %}" class="nav-link">Courses</a>
    </div>
</nav>
<div class="main">
    <div class="wrap">
        <div class="logo-area">
            <img src="{% static 'images/bralogo.jpg' %}" alt="BRA Logo">
            <div class="brand">BRApp</div>
            <div class="brand-sub">Beeston Rylands Archers</div>
        </div>
        <div class="card">
            <div class="card-top"></div>
            <h2>Member Sign In</h2>
            {% if form.non_field_errors %}<div class="err">{{ form.non_field_errors }}</div>{% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="fg">
                    <label for="id_username">Username</label>
                    <input type="text" name="username" id="id_username" placeholder="Your username" autocomplete="username">
                </div>
                <div class="fg">
                    <label for="id_password">Password</label>
                    <input type="password" name="password" id="id_password" placeholder="Password" autocomplete="current-password">
                </div>
                <button type="submit" class="btn">SIGN IN</button>
            </form>
            <hr>
            <div class="foot">Not a member? <a href="{% url 'course_list' %}">Browse our courses</a></div>
        </div>
        <div class="pub-links">
            <a href="{% url 'about' %}">About the Club</a>
            <a href="{% url 'gallery' %}">Gallery</a>
            <a href="{% url 'contact' %}">Contact Us</a>
        </div>
    </div>
</div>
</body>
</html>
