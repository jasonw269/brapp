<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Invalid | BRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato&display=swap" rel="stylesheet">
    <style>
        :root{--gold:#E8A800;--black:#111;--dark:#1A1A1A;--white:#F5F0E8;--muted:#9A9080;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Lato',sans-serif;background:var(--black);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
        h1{font-family:'Cinzel',serif;color:var(--gold);margin-bottom:12px;}
        p{color:var(--muted);font-size:.9rem;}
    </style>
</head>
<body>
<div>
    <div style="font-size:3rem;margin-bottom:16px;">⚠️</div>
    <h1>Link Not Valid</h1>
    <p>{{ reason }}</p>
    <p style="margin-top:12px;">Please contact us if you think this is an error.</p>
</div>
</body>
</html>
