{% extends 'base.html' %}
{% block title %}New Topic{% endblock %}
{% block page_title %}New Forum Topic{% endblock %}
{% block content %}
<div style="max-width:700px;">
<div class="card">
    <div class="card-header">Start a New Topic</div>
    <form method="post" enctype="multipart/form-data">{% csrf_token %}
        <div class="form-group">
            <label class="form-label">Topic Title</label>{{ form.title }}
        </div>
        <div class="form-group">
            <label class="form-label">First Post</label>{{ post_form.body }}
        </div>
        <div class="form-group">
            <label class="form-label">Image (optional)</label>{{ post_form.image }}
        </div>
        <div style="display:flex;gap:10px;">
            <button type="submit" class="btn btn-gold">Create Topic</button>
            <a href="{% url 'topic_list' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
</div>
{% endblock %}
